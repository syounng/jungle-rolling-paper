 <!DOCTYPE html>
 <html lang="ko">
 <head>
     <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
     
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>로그인</title>
     <style>
         .wrap {
             background-color: #D9D9D9;
             width: 100vw;
             min-height: 100vh; 
             display: flex;
             flex-direction: column;
             justify-content: center; /* 세로 중앙 정렬 */
             align-items: center; /* 가로 중앙 정렬 */
             text-align: center;
         }
         body {
             display: flex;
             justify-content: center;
             align-items: center;
             height: 100vh;
             background-color: #f4f4f4;
             font-family: Arial, sans-serif;
         }
         input {
             width: 95%;
             padding: 10px;
             margin: 10px 0;
             border: 1px solid #ccc;
             border-radius: 5px;
         }
         .login_button {
             width: 100%;
             padding: 10px;
             background-color: #28a745;
             color: white;
             border: none;
             border-radius: 5px;
             cursor: pointer;
             margin-top: 10px;
         }
         .login_button:hover {
            background-color: #218838;
         }
         .join_button {
             width: 58.5%;
             padding: 10px;
             background-color: rgba(0,0,0,0);
             border: none;
             cursor: pointer;
             margin-top: 10px;
         }
         .login_notice {
             font-size: 11px;
             
         }
         .pw_eye {
             position: absolute;
             color: #86837c;
             right: 10px;
             bottom: 20px;
         }
         .pw_container{
             position: relative;
             width: 100%;
         }
 
 
     </style>
 </head>
 <body>
     <div>
         <div class="wrap">
             <h1>회원가입</h1>
             <div class="login_notice">
                 <br>
                 * 아이디 : 5~20자의 영문 소문자, 숫자, 특수기호(_, -)만 가능합니다.
                 <br>
                 * 비밀번호 : 8~16자의 영문 대/소문자, 숫자, 특수문자를 사용해주세요.
             </div>
                 <form class="form">
                     <input id="name" type="text" placeholder="이름 (본명을 입력해주세요!)">
                     <input id="id" placeholder="아이디">
                     <div class="pw_container">
                         <input id="pw" type="password" placeholder="비밀번호">
                         <i class="pw_eye fa fa-eye-slash"></i> 
                     </div>
                     <div class="pw_container">
                         <input id="pw-check" type="password" placeholder="비밀번호 확인">
                         <i class="pw_eye fa fa-eye-slash"></i> 
                     </div>
                     <button type="submit" class="login_button" onclick="checkValidation(event); join()">완료</button>
                 </form>
         </div> 
     </div>
 </body>
 <script>
     // 아이디, 비밀번호, 비밀번호 확인 유효성 검사 함수
     function checkValidation() {
         // alert() 뜨는 순간 폼 제출+화면 리셋 방지
         event.preventDefault();
         
         let name = $("#name").val();
         let id = $("#id").val();
         let pw = $("#pw").val();
         let pwCheck = $("#pw-check").val();
 
         // pw 문자열에서 숫자0~9가 포함된 첫 번째 위치를 찾아 num에 저장, 숫자가 없으면 -1 저장
         var num = pw.search(/[0-9]/g);
         
         // pw 문자열에서 대소문자 포함 영어 알파벳의 첫 번째 위치를 찾아 eng에 저장, 영어 문자가 없으면 -1 저장
         // i플래그 : 대소문자 구분 없이 검색
         var eng = pw.search(/[a-z]/ig);
         
         // pw 문자열에서 특정 특수문자가 포함된 첫 번째 위치를 찾아 spe에 저장, 없으면 -1 저장
         var spe = pw.search(/[`~!@@#$%^&*|₩₩₩'₩";:₩/?]/gi);
 
         //이름 검증 로직
         if(name == ""){
             alert("이름을 입력해주세요.");
             return;
         }
 
         //아이디 검증 로직
         let idRegulation = /^[a-z0-9_-]{5,20}$/;
         if(!idRegulation.test(id)) {
             alert("아이디는 5~20자의 영문 소문자, 숫자, 특수기호(_,-)만 사용할 수 있습니다.");
             return;
         }
 
         // 비밀번호 검증 로직
         if(pw.length < 8 || pw.length > 16){
             alert("비밀번호는 8자리 ~ 16자리 이내로 입력해주세요.");            
 
         } else if(pw.search(/\s/) != -1){
             alert("비밀번호는 공백 없이 입력해주세요.");
 
         }else if(num < 0 || eng < 0 || spe < 0 ){
             alert("비밀번호는 영문, 숫자, 특수문자를 혼합하여 입력해주세요.");
             
         }else {
             // 비밀번호 확인 검증 로직
             if(pw != pwCheck){
                 alert("비밀번호가 일치하지 않습니다.")
             }
         }
 
     }
 
     // 비밀번호 보기, 숨기기 기능
     $(document).ready(function(){
     $(".fa-eye-slash").on("click", function(){
         $(this).toggleClass("fa-eye fa-eye-slash"); 
         let input = $(this).prev("input");
 
         if (input.attr("type") === "password") {
             input.attr("type", "text");
         } else {
             input.attr("type", "password");
         }
     });
 });
 
 // 클라이언트의 회원가입 요청 로직
 function join(){
 
             name = $('#name').val();
             id = $('#id').val();
             pw = $('#pw').val();
 
             $.ajax({
                 type:"POST",
                 url:"/join",
                 data:{'name': name, 'id': id, 'pw': pw},
                 success: function(response) {
                     if(response['result'] == 'success'){
                        alert(response['message']); //회원가입 완료 메시지
                        window.history.back(); //로그인 페이지로 리다이렉트
                     } else{
                        alert(response['message']); //회원가입 실패 메시지 (아이디 중복)
                     }
                 }
 
 
             })
         }
 </script>
 </html>
