<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내가 받은 메모</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        html, body {
            margin: 0;
            padding: 0;
            scrollbar-width: none;
            height: 100%;
        }
        .wrap {
            background-color: #D9D9D9;
            width: 100vw;
            min-height: 100vh;
            padding: 50px;
            text-align: center;
            align-items: center;
            display: flex;
            flex-direction: column;
        }
        .main-title {
            font-size: 50px;
            margin-bottom: 20px;
        }
        .memo-container {
            background-color: #ffffff;
            padding: 20px;
            border-radius: 10px;
            width: 60%;
            margin-top: 30px;
            box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.1);
        }
        .memo-list {
            margin-top: 20px;
        }
        .card {
            padding: 15px;
            text-align: center;
            box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.1);
            min-height: 220px; /* 카드 높이 유지 */
        }
        .nickname-input, .guess-btn {
            margin-top: 10px;
        }
        .hidden {
            visibility: hidden; /* 요소를 숨기되 공간은 유지 */
        }
        .result-text {
            font-size: 18px;
            font-weight: bold;
            margin-top: 10px;
            min-height: 24px; /* 결과 텍스트 영역 유지 */
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="title">
            <span class="main-title">{{ to_id }} 님의 무기창고</span>
        </div>
        <h3>익명의 정글러가 남긴 메시지를 확인해 보세요 👀</h3>

        <!-- ✅ 받은 메모 목록 -->
        <div class="container mt-4">
            <div class="row g-4" id="memoList">
                <!-- 메모가 동적으로 추가됨 -->
            </div>
        </div>
    </div>

    <script>
        $(document).ready(function () {
            let to_id = "{{ to_id }}";  // Flask에서 전달된 to_id 값

            // ✅ 내가 받은 메모 가져오기
            function loadMyMemos() {
                $.ajax({
                    type: "GET",
                    url: `/mymemo/memos/me/${to_id}`,
                    success: function (response) {
                        let memos = response.memos;
                        $("#memoList").empty();

                        memos.forEach((memo, index) => {
                            let memoCard = `
                                <div class="col-lg-3 col-md-4 col-sm-6 col-12">
                                    <div class="card">
                                        <div class="card-body" id="memo-${index}">
                                            <p>✉️ <strong>${memo.nickname}</strong> 님의 메시지</p>
                                            <div class="mb-2 memo-content"><strong>${memo.content}</strong></div>

                                            <!-- ✅ 입력칸, 버튼, 결과 텍스트 -->
                                            <input type="text" class="form-control nickname-input" placeholder="본명을 입력하세요">
                                            <button class="btn btn-primary mt-2 guess-btn" data-index="${index}">맞추기</button>
                                            <div class="result-text mt-2"></div>
                                        </div>
                                    </div>
                                </div>`;
                            $("#memoList").append(memoCard);
                        });

                        // ✅ 본명 맞추기 기능
                        $(".guess-btn").click(function () {
                            let index = $(this).data("index");
                            let inputName = $(this).siblings(".nickname-input").val().trim();
                            let correctNickname = memos[index].nickname;
                            let memoDiv = $(`#memo-${index}`);
                            let resultText = memoDiv.find(".result-text");

                            // 입력칸과 버튼 숨기기 (공간 유지)
                            $(this).siblings(".nickname-input").addClass("hidden");
                            $(this).addClass("hidden");

                            if (inputName === correctNickname) {
                                // ✅ 정답일 경우 메시지 추가
                                resultText.html(`<span class="text-success"><strong>${correctNickname}</strong> 님을 잡았습니다! 🎉</span>`);
                            } else {
                                // ❌ 오답일 경우 메시지 추가
                                resultText.html(`<span class="text-danger"><strong>${correctNickname}</strong> 님을 놓쳤습니다... ❌</span>`);
                            }
                        });
                    },
                    error: function () {
                        alert("메모를 불러올 수 없습니다.");
                    }
                });
            }

            loadMyMemos();  // 페이지 로드 시 메모 불러오기
        });
    </script>
</body>
</html>
