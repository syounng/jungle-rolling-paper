<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jungleRollingpaper</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        html, body {
            margin: 0;
            padding: 0;
            scrollbar-width: none;
            height: 100%;
        }
        .wrap {
            background-color: #D9D9D9;
            width: 100vw;
            min-height: 100vh;
            padding: 50px;
            text-align: center;
            align-items: center;
            display: flex;
            flex-direction: column;
        }
        .main-title {
            font-size: 80px;
        }
        .sub-title {
            font-size: 40px;
        }
        .memo-container {
            background-color: #ffffff;
            padding: 20px;
            border-radius: 10px;
            width: 50%;
            margin-top: 30px;
            box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.1);
        }
        .memo-list {
            margin-top: 20px;
        }
        .card {
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="title">
            <span class="main-title">{{ to_id }} 님을 위한 한마디</span>
        </div>
        <span class="sub-title">🔥개발자의 정글에서 동료를 살릴 한마디를 건네보세요!</span>

        <!-- ✅ 메모 작성 UI -->
        <div class="memo-container">
            <h3>💬 메모 남기기</h3>
            <input type="text" id="nickname" class="form-control mb-2" placeholder="닉네임을 입력하세요">
            <textarea id="content" class="form-control mb-2" placeholder="메모 내용을 입력하세요"></textarea>
            <button class="btn btn-primary" id="sendMemo">메모 남기기</button>
        </div>

        <!-- ✅ 받은 메모 목록 -->
        <div class="container mt-4">
            <div class="row g-5" id="memoList">
                <!-- 메모가 동적으로 추가됨 -->
            </div>
        </div>
    </div>

    <script>
        $(document).ready(function () {
            // 문제가 있을 가능성이 있다.
            let to_id = "{{ to_id }}";
            let access_token = localStorage.getItem("access_token");

            // ✅ 특정 동료의 메모 가져오기
            function loadMemos() {
                $.ajax({
                    type: "GET",
                    // 문제가 있을 가능성이 있다.
                    url: `/memos/${to_id}`,
                    headers: { "Authorization": "Bearer " + access_token },
                    success: function (response) {
                        let memos = response.memos;
                        $("#memoList").empty();

                        memos.forEach(memo => {
                            let memoCard = `
                                <div class="col-lg-2 col-md-4 col-sm-6 col-12">
                                    <div class="card">
                                        <div class="card-body">
                                            <p><strong>${memo.nickname}</strong> 님의 메세지</p>
                                            <div>${memo.content}</div>
                                        </div>
                                    </div>
                                </div>`;
                            $("#memoList").append(memoCard);
                        });
                    },
                    error: function () {
                        alert("메모를 불러올 수 없습니다.");
                    }
                });
            }

            loadMemos();  // 페이지 로드 시 메모 불러오기

            // ✅ 메모 등록
            $("#sendMemo").click(function () {
                let nickname = $("#nickname").val();
                let content = $("#content").val();

                if (!content.trim()) {
                    alert("메모 내용을 입력하세요!");
                    return;
                }

                $.ajax({
                    type: "POST",
                    url: "/regist/memo",
                    contentType: "application/json",
                    headers: { "Authorization": "Bearer " + access_token },
                    data: JSON.stringify({ to_id, nickname, content }),
                    success: function () {
                        alert("메모가 등록되었습니다!");
                        loadMemos();
                    },
                    error: function () {
                        alert("메모 등록 실패");
                    }
                });
            });
        });
    </script>
</body>
</html>
