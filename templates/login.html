<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인</title>
    <style>
        .wrap {
            background-color: #D9D9D9;
            width: 100vw;
            min-height: 100vh; 
            display: flex;
            flex-direction: column;
            justify-content: center; /* 세로 중앙 정렬 */
            align-items: center; /* 가로 중앙 정렬 */
            text-align: center;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f4f4;
            font-family: Arial, sans-serif;
        }
        input {
            width: 95%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .login_button {
            width: 100%;
            padding: 10px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
        }
        .login_button:hover {
           background-color: #218838;
        }
        .join_button {
            width: 58.5%;
            padding: 10px;
            background-color: rgba(0,0,0,0);
            border: none;
            cursor: pointer;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="wrap">
            <h2>로그인</h2>
            <form>
                <input id="id" type="text" placeholder="아이디" required>
                <input type="password" placeholder="비밀번호" required>
                <button type="submit" class="login_button">로그인</button>
            </form>
            <button type="button" class="join_button">회원가입 👀</button>
    </div>
</body>

</html>
