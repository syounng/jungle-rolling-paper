<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jungleRollingpaper</title>
    <!-- Bootstrap CSS -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bagel+Fat+One&family=Gasoek+One&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbit&display=swap" rel="stylesheet">    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            scrollbar-width: none;
            height: 100%;
        }
        .wrap {
            background-color: #D9D9D9;
            width: 100vw;
            min-height: 100vh; 
            padding: 50px;
            text-align: center;
            align-items: center;
            display: flex;
            flex-direction: column;
            
        }
        .main-title {
            font-size:80px;
            
        }
        .title {
            display: flex;
            flex-direction: row;
            align-items: center; /* 세로 중앙 정렬 추가 */
        }
        .profile-image{
            width: 200px;   /* 네모의 너비 */
            height: 200px;  /* 네모의 높이 */
            overflow: hidden;  /* 이미지가 네모 밖으로 나가지 않도록 설정 */
            background-color: #a1deab;
        }
        .mypage{
            display: flex;
            flex-direction: row;
            gap:60px;

        }
        .mypage-left {
            display: flex;
            flex-direction: column;
            gap:10px;
        }
        .mypage-right {
            display: flex;
            flex-direction: column;
            gap:10px;
            margin-top: 70px;
            font-size: large;
        }
        .to-my-list-btn {
            border: none;
            background-color: rgba(0,0,0,0);
        }
        .pic-btn {
            border: 1px;
        }
        .bagel-fat-one-regular {
            font-family: "Bagel Fat One", system-ui;
            font-weight: 400;
            font-style: normal;
        }
        .orbit-regular {
            font-family: "Orbit", sans-serif;
            font-weight: 400;
            font-style: normal;
        }
        .back-btn {
           font-size: 24px;  /* 버튼 크기 키우기 */
           padding: 10px 20px;
           border-radius: 10px;
           position: absolute;
           left: 180px; /* 조금만 오른쪽으로 조정 */
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="title">
            <button class="btn btn-light back-btn">←</button>
            <span class="main-title">나의 정보</span>
        </div>
        <br><br>
        <div class="mypage">
            <div class="mypage-left">
                <form class="mypage-left" id="uploadForm">

                    <img  id="preview" src="/get-profile-picture/{{ user_name }}" style="max-width: 200px;">
                    <button type="button" class="orbit-regular" id="uploadButton">찾아보기</button>
                    <input type="file" id="profilePicture" name="profilePicture" accept="image/*" style="display: none;">
                    <button type="submit" class="orbit-regular">수정</button>

                </form>
            </div>
            <div class="mypage-right">
                <h class="orbit-regular">이름: {{user_name}}</h>
                <h class="orbit-regular">나의 무기 개수: {{memos_count}}</h>
                <button type="button" class="to-my-list-btn orbit-regular" onclick="toMyList()">나의 무기창고 바로가기 🔥</button>
            </div>
            
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    </div>
    <script>
        $(".back-btn").click(function () {
            window.history.back();
        });

        $('#uploadButton').click(function() {
  
        $('#profilePicture').click();  // hidden file input 클릭
        });

        $('#profilePicture').change(function(e) {
        let reader = new FileReader();
        reader.onload = function(event) {
            $('#preview').attr('src', event.target.result).show();
        }
        reader.readAsDataURL(e.target.files[0]);
        });

        $('#uploadForm').submit(function(e) {
        e.preventDefault();

        let formData = new FormData();
        formData.append('profilePicture', $('#profilePicture')[0].files[0]);
        formData.append('user_name', '{{user_name}}');

        $.ajax({
            url: '/upload-profile-picture', // 서버에 업로드 요청을 보낼 URL
            type: 'POST',
            data: formData,
            contentType: false,
            processData: false,
            success: function(response) {
                alert('Upload successful!');
            },
            error: function(xhr, status, error) {
                alert('Upload failed!');
            }
        });
        });
        function toMyList(){
            window.location.href = "/mymemo/rollingpaper/me";
            console.log('고마이리스트');
        }
    </script>
</body>
</html>
