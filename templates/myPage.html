<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jungleRollingpaper</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        html, body {
            margin: 0;
            padding: 0;
            scrollbar-width: none;
            height: 100%;
        }
        .wrap {
            background-color: #D9D9D9;
            width: 100vw;
            min-height: 100vh; 
            padding: 50px;
            text-align: center;
            align-items: center;
            display: flex;
            flex-direction: column;
            
        }
        .main-title {
            font-size:80px;
            
        }
        .title {
            display: flex;
            flex-direction: row;
            align-items: center; /* 세로 중앙 정렬 추가 */
        }
        .profile-image{
            width: 200px;   /* 네모의 너비 */
            height: 200px;  /* 네모의 높이 */
            overflow: hidden;  /* 이미지가 네모 밖으로 나가지 않도록 설정 */
            background-color: #a1deab;
        }
        .mypage{
            display: flex;
            flex-direction: row;
            gap:60px;

        }
        .mypage-left {
            display: flex;
            flex-direction: column;
            gap:10px;
        }
        .mypage-right {
            display: flex;
            flex-direction: column;
            gap:10px;
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="title">
            <span class="main-title">나의 정보</span>
            
        </div>
        <br><br>
        <div class="mypage">
            <div class="mypage-left">
                <div class="profile-image"></div>
                <button>찾아보기</button>
                <button>수정</button>
            </div>
            <div class="mypage-right">
                <h>이름: </h>
                <h>나의 무기 개수: </h>
                <a>나의 무기창고 바로가기</a>
            </div>
            
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    </div>
</body>
</html>
