<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jungleRollingpaper</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        html, body {
            margin: 0;
            padding: 0;
            scrollbar-width: none;
            height: 100%;
        }
        .wrap {
            background-color: #D9D9D9;
            width: 100vw;
            min-height: 100vh; 
            padding: 50px;
            text-align: center;
            align-items: center;
            display: flex;
            flex-direction: column;
            
        }
        .main-title {
            font-size:80px;
            
        }
        .title {
            display: flex;
            flex-direction: row;
            align-items: center; /* 세로 중앙 정렬 추가 */
        }
        .profile-image{
            width: 200px;   /* 네모의 너비 */
            height: 200px;  /* 네모의 높이 */
            overflow: hidden;  /* 이미지가 네모 밖으로 나가지 않도록 설정 */
            background-color: #a1deab;
        }
        .mypage{
            display: flex;
            flex-direction: row;
            gap:60px;

        }
        .mypage-left {
            display: flex;
            flex-direction: column;
            gap:10px;
        }
        .mypage-right {
            display: flex;
            flex-direction: column;
            gap:10px;
            margin-top: 70px;
            font-size: large;
        }
        .to-my-list-btn {
            border: none;
            background-color: rgba(0,0,0,0);
        }
        .pic-btn {
            border: 1px;
        }
        .bagel-fat-one-regular {
            font-family: "Bagel Fat One", system-ui;
            font-weight: 400;
            font-style: normal;
        }
        .orbit-regular {
            font-family: "Orbit", sans-serif;
            font-weight: 400;
            font-style: normal;
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="title">
            <span class="main-title bagel-fat-one-regular">나의 정보</span>
            
        </div>
        <br><br>
        <div class="mypage">
            <div class="mypage-left">
                <div class="profile-image"></div>
                <button>찾아보기</button>
                <button>수정</button>
            </div>
            <div class="mypage-right">
                <h>이름: {{user_name}}</h>
                <h>나의 무기 개수: {{memos_count}}</h>
                <a>나의 무기창고 바로가기</a>
            </div>
            
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>



        $('#uploadButton').click(function() {
  
            $('#profilePicture').click();  // hidden file input 클릭
        });

        $('#profilePicture').change(function(e) {
            let reader = new FileReader();
            reader.onload = function(event) {
                $('#preview').attr('src', event.target.result).show();
            }
            reader.readAsDataURL(e.target.files[0]);
        });

        $('#uploadForm').submit(function(e) {
            e.preventDefault();

            let formData = new FormData();
            formData.append('profilePicture', $('#profilePicture')[0].files[0]);
            formData.append('user_name', '{{user_name}}');

            $.ajax({
                url: '/upload-profile-picture', // 서버에 업로드 요청을 보낼 URL
                type: 'POST',
                data: formData,
                contentType: false,
                processData: false,
                success: function(response) {
                    alert('Upload successful!');
                },
                error: function(xhr, status, error) {
                    alert('Upload failed!');
                }
            });
        });
    </script>
    </div>
    <script>
        function toMyList(){
            window.location.href = "/mymemo/rollingpaper/me";
            console.log('고마이리스트');
        }
    </script>
</body>
</html>
