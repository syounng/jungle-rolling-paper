<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jungleRollingpaper</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        html, body {
            margin: 0;
            padding: 0;
            scrollbar-width: none;
            height: 100%;
        }
        .wrap {
            background-color: #D9D9D9;
            width: 100vw;
            min-height: 100vh; 
            padding: 50px;
            text-align: center;
            align-items: center;
            display: flex;
            flex-direction: column;
            
        }
        .main-title {
            font-size:80px;
            
        }
        .sub-title {
            font-size:40px;
        }
        .circle {
            width: 100px; /* 원의 너비 */
            height: 100px; /* 원의 높이 */
            background-color: #ffffff; /* 원의 색상 */
            border-radius: 50%; /* 둥글게 만들어 원 모양 */
            cursor: pointer;
        }
        .title {
            display: flex;
            flex-direction: row;
            align-items: center; /* 세로 중앙 정렬 추가 */
        }
        .profile {
            display: flex;
            flex-direction: column;
        }
        .name {
            font-size:30px;
        }
        .card {
            height: 200px; /* 카드 높이 고정 */
            display: flex;
            align-items: center; /* 수직 가운데 정렬 */
            justify-content: center; /* 수평 가운데 정렬 */
            text-align: center;
        }
        .profile-image{
            width: 150px;   /* 네모의 너비 */
            height: 150px;  /* 네모의 높이 */
            overflow: hidden;  /* 이미지가 네모 밖으로 나가지 않도록 설정 */
            background-color: #a1deab;
        }
        .profile-bottom{
            text-align: center;
        }


    </style>
</head>
<body>
    <div class="wrap">
        <div class="title">
            <span class="main-title">🌳정글 306호에 사는 사람들⚔</span>
            &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;
            <div class="profile">
                <div class="circle" id="mypage" onclick="goMypage()"></div>
                <div class="name">OOO</div>
            </div>
        </div>
        <span class="sub-title">우리는 모두 같은 정글에서 살아남고 있다!</span>

        <div class="container mt-4">
        <div class="row g-5">
            
            {% for user in users %}
                <div class="col-lg-2 col-md-4 col-sm-6 col-12">
                    <div class="card">
                        <div class="card-body">
                            <div class="profile-image"></div>
                            <div class="profile-bottom">
                                <span>{{user['name']}}</span>
                            </div>
                        </div>
                    </div>
                </div>
            {% endfor %}
            
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    </div>

    <script>
        function goMypage(){
            $.ajax({
                type: "GET",
                url: "/mypage"
            })
        }
    </script>
</body>
</html>
